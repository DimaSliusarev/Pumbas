<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pumbas Music Player</title>
  <link rel="stylesheet" href="styles.css">
  <script src="musicplayer.js" defer></script>
</head>
<body>
  <main class="player-shell">
    <section class="library-picker" aria-labelledby="track-selector-label">
      <label id="track-selector-label" for="track-selector">Choose a track</label>
      <select id="track-selector" disabled>
        <option value="">Loading music library...</option>
      </select>
      <p id="library-status" role="status" aria-live="polite">Scanning the usa-1 folder...</p>
    </section>

    <div class="mood">
      <h1 class="mood-text">Your Current Vibe</h1>
      <p class="mood-tag" id="current-vibe-tag">None</p>
    </div>

    <section class="music-player" aria-label="Music player">
      <img
        class="album-art"
        src="https://images.unsplash.com/photo-1614613535308-eb5fbd3d2c17?auto=format&amp;fit=crop&amp;w=480&amp;q=80"
        alt="Colorful vinyl records"
        width="240"
        height="240"
      >

      <div class="track-info">
        <h2 class="title" id="track-title">Select a track</h2>
        <p class="artist" id="track-group">Waiting...</p>
      </div>

      <audio id="audio-player" preload="metadata"></audio>

      <div class="progress-container">
        <span class="time" id="elapsed-time">0:00</span>
        <input
          class="progress-slider"
          id="progress-slider"
          type="range"
          min="0"
          max="100"
          step="0.1"
          value="0"
          aria-label="Track progress"
          disabled
        >
        <span class="time" id="duration-time">0:00</span>
      </div>

      <div class="controls">
        <button class="btn" id="previous-button" type="button" aria-label="Previous track" disabled>
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M6 6h2v12H6zm3.5 6 8.5 6V6z"/></svg>
        </button>
        <button class="btn play-btn" id="play-button" type="button" aria-label="Play" disabled>
          <svg viewBox="0 0 24 24" aria-hidden="true"><path id="play-icon" d="M8 5v14l11-7z"/></svg>
        </button>
        <button class="btn" id="next-button" type="button" aria-label="Next track" disabled>
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="m6 18 8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg>
        </button>
      </div>
    </section>
  </main>
</body>
</html>
