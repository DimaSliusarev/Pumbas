<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Campus Area Tracker</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
  integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
  integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
<style>
  #map { height: 400px; }
</style>
</head>
<body>

<h1>Campus Area Tracker</h1>

<h2>1. Areas</h2>
<div id="areaList">No areas loaded.</div>

<h2>2. Detection</h2>
<button id="watchBtn" onclick="toggleWatch()">Start tracking</button>
<p id="status">Detection stopped.</p>
<p id="posInfo"></p>

<h2>3. Map</h2>
<div id="map"></div>

<script src="locationtracker.js"></script>

</body>
</html>
