<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,user-scalable=no,initial-scale=1,maximum-scale=1">
<title>Campus Context Tracker</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
  integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
  integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
<style>
  #map { height: 400px; }
  #context { font-size: 20px; font-weight: 900; color: red; }
  button { padding: 12px 16px; font-size: 16px; }
  #features { background: #f4f4f4; padding: 8px; font-family: monospace; font-size: 13px; }
  #warn { color: #b00; font-size: 12px; }
  #prompt { background: #eef4ff; padding: 8px; font-family: monospace; font-size: 13px;
            white-space: pre-wrap; border: 1px solid #ccd; }
  #promptTime { color: #555; font-size: 12px; }
</style>
</head>
<body>

<h1>Campus Context Tracker</h1>

<button id="startBtn" onclick="toggleAll()">Start tracking</button>

<h2>Context</h2>
<p id="context">no area / unknown</p>
<p id="status">Stopped.</p>
<p id="posInfo"></p>
<p id="warn"></p>

<h2>Map</h2>
<div id="map"></div>

<h2>LLM prompt </h2>
<div id="prompt">No prompt</div>

<h2>Features</h2>
<div id="features">
  <div>samples: <span id="sampleCount">0</span> / <span id="windowSize">200</span>
       &nbsp; source: <span id="accelSource">none</span></div>
  <div>mean: <span id="magMean">0</span> &nbsp; std: <span id="magStd">0</span>
       &nbsp; mad: <span id="magMad">0</span> &nbsp; rms: <span id="magRms">0</span></div>
  <div>max: <span id="magMax">0</span> &nbsp; range: <span id="magRange">0</span></div>
  <div>crossings/sec: <span id="magCrossRate">0</span>
       &nbsp; peaks/sec: <span id="magPeakRate">0</span></div>
</div>

<script src="locationtracker.js"></script>

</body>
</html>
